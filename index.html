<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ AnimGallery Pro - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <a href="index.html" class="logo">✨ Belajar Test UBAH DI CI CD</a>
        <nav>
            <a href="index.html" class="active">Home</a>
            <a href="about.html">About</a>
            <button class="theme-btn" id="themeToggle">
                <span id="themeIcon">🌙</span> Dark Mode
            </button>
        </nav>
    </header>

    <div class="controls">
        <button class="control-btn active" data-filter="all">All</button>
        <button class="control-btn" data-action="play-all">▶ Play All</button>
        <button class="control-btn" data-action="pause-all">⏸ Pause All</button>
    </div>

    <div class="gallery" id="gallery">
        <!-- Cards will be generated by script.js -->
    </div>

    <footer>
        <p>Built with ❤️ using HTML, CSS, and JS (Multi-page Edition).</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
