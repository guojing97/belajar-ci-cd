<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ AnimGallery Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        /* CSS Reset & Variables */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            /* Light Theme */
            --bg-color: #f3f4f6;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-border: rgba(255, 255, 255, 0.5);
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            --glass-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            /* Dark Theme */
            --bg-color: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
            --primary: #818cf8;
            --primary-hover: #6366f1;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            --glass-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.4s ease, color 0.4s ease;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            background-image: radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.1), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(236, 72, 153, 0.1), transparent 25%);
        }

        /* Header */
        header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding: 1.5rem 2rem;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            box-shadow: var(--glass-shadow);
            z-index: 10;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .theme-btn {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 0.6rem 1.2rem;
            border-radius: 30px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .theme-btn:hover {
            background: var(--primary);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        /* Controls */
        .controls {
            width: 100%;
            max-width: 1200px;
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .control-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.2s ease;
        }

        .control-btn:hover, .control-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Gallery Grid */
        .gallery {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        /* Animation Card */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: var(--shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: var(--glass-shadow);
        }

        .card-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .trigger-btn {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .trigger-btn:hover {
            background: rgba(99, 102, 241, 0.2);
        }

        /* The animatable object */
        .anim-object {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 2rem;
            margin-bottom: 2rem;
        }

        /* Footer */
        footer {
            margin-top: 4rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: center;
        }

        /* =========================================
           KEYFRAMES & ANIMATION CLASSES
           ========================================= */
        
        /* 1. Float */
        @keyframes floatAnim {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        .anim-float { animation: floatAnim 3s ease-in-out infinite; }

        /* 2. Pulse */
        @keyframes pulseAnim {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(99, 102, 241, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }
        .anim-pulse { animation: pulseAnim 2s infinite; }

        /* 3. Spin */
        @keyframes spinAnim {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .anim-spin { animation: spinAnim 4s linear infinite; }

        /* 4. Bounce */
        @keyframes bounceAnim {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-30px); }
            60% { transform: translateY(-15px); }
        }
        .anim-bounce { animation: bounceAnim 2s infinite; }

        /* 5. Shake */
        @keyframes shakeAnim {
            0% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
            20%, 40%, 60%, 80% { transform: translateX(10px); }
            100% { transform: translateX(0); }
        }
        .anim-shake { animation: shakeAnim 1s ease-in-out infinite; }
        
        /* 6. Flip */
        @keyframes flipAnim {
            0% { transform: perspective(400px) rotateY(0); }
            100% { transform: perspective(400px) rotateY(360deg); }
        }
        .anim-flip { animation: flipAnim 3s ease-in-out infinite; }

        /* 7. Wobble */
        @keyframes wobbleAnim {
            0% { transform: translateX(0%); }
            15% { transform: translateX(-25%) rotate(-5deg); }
            30% { transform: translateX(20%) rotate(3deg); }
            45% { transform: translateX(-15%) rotate(-3deg); }
            60% { transform: translateX(10%) rotate(2deg); }
            75% { transform: translateX(-5%) rotate(-1deg); }
            100% { transform: translateX(0%); }
        }
        .anim-wobble { animation: wobbleAnim 2s ease-in-out infinite; }

        /* 8. Heartbeat */
        @keyframes heartbeatAnim {
            0% { transform: scale(1); }
            14% { transform: scale(1.3); }
            28% { transform: scale(1); }
            42% { transform: scale(1.3); }
            70% { transform: scale(1); }
        }
        .anim-heartbeat { animation: heartbeatAnim 1.5s ease-in-out infinite; }

        /* Utility for JS trigger */
        .paused { animation-play-state: paused !important; }

        @media (max-width: 768px) {
            .gallery {
                grid-template-columns: 1fr;
            }
            header {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">✨ AnimGallery Pro</div>
        <button class="theme-btn" id="themeToggle">
            <span id="themeIcon">🌙</span> Dark Mode
        </button>
    </header>

    <div class="controls">
        <button class="control-btn active" data-filter="all">All</button>
        <button class="control-btn" data-action="play-all">▶ Play All</button>
        <button class="control-btn" data-action="pause-all">⏸ Pause All</button>
    </div>

    <div class="gallery" id="gallery">
        <!-- Cards will be generated by JS -->
    </div>

    <footer>
        <p>Built with ❤️ using pure HTML, CSS, and Vanilla JS.</p>
    </footer>

    <script>
        const animations = [
            { id: 'float', name: 'Float', icon: '🛸', class: 'anim-float' },
            { id: 'pulse', name: 'Pulse', icon: '💓', class: 'anim-pulse' },
            { id: 'spin', name: 'Spin', icon: '🌀', class: 'anim-spin' },
            { id: 'bounce', name: 'Bounce', icon: '🏀', class: 'anim-bounce' },
            { id: 'shake', name: 'Shake', icon: '👋', class: 'anim-shake' },
            { id: 'flip', name: 'Flip', icon: '🎴', class: 'anim-flip' },
            { id: 'wobble', name: 'Wobble', icon: '🥴', class: 'anim-wobble' },
            { id: 'heartbeat', name: 'Heartbeat', icon: '❤️', class: 'anim-heartbeat' }
        ];

        const gallery = document.getElementById('gallery');

        // Render Cards
        function renderGallery() {
            gallery.innerHTML = animations.map(anim => `
                <div class="card" onclick="toggleAnimation(this)">
                    <div class="card-header">
                        <span class="card-title">${anim.name}</span>
                        <button class="trigger-btn">Toggle</button>
                    </div>
                    <div class="anim-object ${anim.class}">
                        ${anim.icon}
                    </div>
                </div>
            `).join('');
        }

        // Toggle Individual Animation
        window.toggleAnimation = function(cardEl) {
            const object = cardEl.querySelector('.anim-object');
            object.classList.toggle('paused');
            
            // Add a subtle click effect to the card itself
            cardEl.style.transform = 'scale(0.95)';
            setTimeout(() => {
                cardEl.style.transform = '';
            }, 150);
        };

        // Controls (Play/Pause All)
        document.querySelectorAll('.control-btn[data-action]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const action = e.target.dataset.action;
                const objects = document.querySelectorAll('.anim-object');
                
                objects.forEach(obj => {
                    if (action === 'play-all') {
                        obj.classList.remove('paused');
                    } else if (action === 'pause-all') {
                        obj.classList.add('paused');
                    }
                });
            });
        });

        // Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        
        // Check local storage for theme preference
        const savedTheme = localStorage.getItem('anim-theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeUI(savedTheme);

        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('anim-theme', newTheme);
            updateThemeUI(newTheme);
        });

        function updateThemeUI(theme) {
            if (theme === 'dark') {
                themeIcon.textContent = '☀️';
                themeToggle.innerHTML = '<span id="themeIcon">☀️</span> Light Mode';
            } else {
                themeIcon.textContent = '🌙';
                themeToggle.innerHTML = '<span id="themeIcon">🌙</span> Dark Mode';
            }
        }

        // Initialize
        renderGallery();
    </script>
</body>
</html>
